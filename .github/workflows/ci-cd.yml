name: CI/CD -- Restaurant API

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/restaurant-api
  SOLUTION_FILE: Restaurants.Administration.sln

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installer .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restaurer les dependances
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Compiler le projet
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration Release

      - name: Executer les tests
        run: dotnet test ${{ env.SOLUTION_FILE }} --no-build --configuration Release --verbosity normal

  docker-publish:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generer les tags et metadonnees
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Builder et pousser l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Presentation/Restaurants.Presentation.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}